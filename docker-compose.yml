# =====================================================================
# Karabuk FWI — local Docker compose (starter template)
# =====================================================================
# Conservative defaults aimed at a single-host development / demo
# deployment. Smoke-test before relying on it; see
# docs/DEPLOYMENT_PLAN.md for the full rollout plan.
# =====================================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: karabuk-fwi-backend:latest
    container_name: karabuk-fwi-backend
    restart: unless-stopped
    environment:
      KARABUK_DB_PATH: /app/outputs/karabuk_fwi.db
      # The image itself is built with BACKEND_ENV=production so the
      # uvicorn watcher never starts. Override for a dev container if
      # you want auto-reload (and bind-mount /app/src as a volume).
      BACKEND_ENV: production
      # Compose default: allow the frontend container's host-published
      # origin (browser → http://localhost:3000). Tighten or replace
      # for any deployment that sits behind a reverse proxy / TLS edge.
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      # Local compose is a demo stack, so the synthetic Test alert flow
      # is explicitly enabled even though BACKEND_ENV is production-like.
      # Set to "false" before exposing the API beyond a trusted demo.
      DEMO_ALERTS_ENABLED: "true"
    volumes:
      - backend_outputs:/app/outputs
      # Persist detection evidence (alerts.jsonl + JPGs) across
      # `compose down`/`up`. Mount to a host path if you want to
      # inspect it from outside the container.
      - backend_notifications:/app/data/notifications
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/system/health', timeout=2).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* must be set at build time. `backend` resolves
        # via the compose-network DNS once the stack is up.
        NEXT_PUBLIC_API_URL: http://localhost:8000
    image: karabuk-fwi-frontend:latest
    container_name: karabuk-fwi-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  backend_outputs:
    name: karabuk_fwi_backend_outputs
  backend_notifications:
    name: karabuk_fwi_backend_notifications
