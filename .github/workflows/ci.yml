# =====================================================================
# Karabuk FWI - continuous integration
# =====================================================================
# Three independent jobs: backend tests, frontend build, docker
# config-validation. Hardware-dependent paths (cameras, drone,
# YOLO) are NOT exercised in CI - they require physical devices.
# =====================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: System libs for OpenCV / ultralytics
        # The headless OpenCV used in monitoring needs libGL / libglib
        # at runtime; install the same minimal set the Dockerfile uses.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run pytest
        run: python -m pytest backend/tests -q

      - name: Run smoke check (no external services)
        run: python backend/scripts/smoke_check.py
        env:
          # Keep the smoke check in demo-safe development mode.
          BACKEND_ENV: development

  frontend-build:
    name: Frontend production build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Lint
        run: npm run lint || echo "lint warnings ignored - non-blocking"
        continue-on-error: true

  docker-validate:
    name: Docker compose config
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config

      # We do NOT run `docker compose build` in CI - the backend image
      # depends on torch / ultralytics, which is multi-GB and not
      # something a free-tier runner should pull on every push.
      # Local devs and the deployment pipeline build the images.
